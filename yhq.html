<!DOCTYPE html>

  <link rel="stylesheet" href="style.css">
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        margin:0;
        justify-content:center;
        align-items:center;
        background-color: #f0f0f0;
        font-family:"微软雅黑",sans-serif;
        overflow: auto;
        display:flex; 
        min-height:100vh;
    } 
    .main-container{
        width:393px;

        background-color: #F9F9F9;
        display:flex;

        align-items:center;
        text-align:center;
        position:relative;
    }
    .top-container{
        width:100%;

        background-color: #fff;
    }
     .back-btn{
        font-size:25px;
            color:#000;
            text-decoration: none;
          width:50px;

          z-index:10;
    }
    .page-title{
        font-size:24px;
            color:#000;
            margin-top:80px;
            flex:1;
            width:100%;
            
            margin-left:20px;
    }
    .tab-bar{
        width:100%;
        display:flex;
        justify-content: space-around;
        background-color: #fff;
        padding:30px 0 10px 0;
    }
    .tab-item{
        font-size:16px;
        color:#000;
        padding:5px 0;
        cursor:pointer;
    }
    .tab-item.active{
        color:#FB3F3F;
        border-bottom:3px solid #FB3F3F;
        font-weight:bold;
    }
    .white-box{
        width:95%;
        height:108px;
        margin-top:20px;
        background-color: #fff;
        border-radius: 3px;

       padding:20px 5px  20px 30px;

    }
 .new-tag{

 }
 .tag-title{
    font-size:10px;

    z-index:30;
    top:25px;
    left:3px;
    transform: rotate(-47.81deg);
            transform-origin: left top;
 }
   .price-left{
    font-size:20px;

        align-items: center;
        line-height:26px;
        text-align:center;
        margin-top:-40px;
        margin-left:260px;

    }
