<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>
    注册
</title>
<style>
    body{
        margin:0;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        background-color: #f0f0f0;
    }
    .top-img{
        position: absolute;
        top:0;
        left:0;
        width:402px;
        height:62px;
    }
    .register-box{
        width:393px;
        height:852px;
        background:url('picture/bg2.jpg');
        background-size:cover;
        background-position:center;
        position:relative;
    }
     
    .white-box{
        width:393px;
        height:629px;
        background-color: #fff;
        border-radius: 24px 24px 0px 0px;
        position: absolute;
        
        top:223px;
        left:0px;
        padding:20px 20px;
        box-sizing:border-box;
    }
   
    .title-text{
        font-size:24px;
        color:#000;
        position:absolute;
       top:158px;
       left:101px;
       z-index:20;
    }
    .login-link{
       text-align:right;
        margin-bottom:10px;
        margin-top:10px;
        font-size:16px;
        /*position:absolute;
        top:251px;
        left:231px;
        z-index:30;
        white-space:nowrap;*/
    }
    .login-link a{
        color:#FF8C00;
        text-decoration: none;
    }
        .input-item {
            display:flex;
            align-items: center;
            margin-bottom: 25px;
            width:100%;
        }
    .input-item label{
        
        font-size:20px;
        color:#000;
        margin-bottom:0;
        flex-shrink:0;
    }
    .input-item input{
       flex:1;
        height:61px;
        border:none;
        border-bottom:0px solid #C3C3C3;
        font-size:20px;
        color:#9A9A9A;
        background:transparent;
    }
    .code-row{
        flex:1;
        display:flex;
        gap:5px;
      align-items:Center;
    }
    .code-row input{
        width: 150px;        /* 固定宽度，让输入框变短 */
        flex: none;          /* 取消flex:1，使用固定宽度 */
        height: 50px;
        border: none;
        border-bottom: 0px solid #C3C3C3;
        font-size: 18px;
        background: transparent;
        box-sizing: border-box
    }
    .get-code-btn{
   width: 100px;
        height: 35px;
        background-color: #FF8C00;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .register-btn{
        width:80%;
        height:50px;
        background-color: #FF8C00;
        color:#fff;
        border:none;
        border-radius: 8px;
        position:absolute;
        top:550px;
        left:40px;   
         z-index:30;
        font-size:16px;
        font-weight:bold;
        margin-top:40px 0 20px;
    
        /*cursor:pointer;*/
    }
  
    .agreement{
        font-size:14px;
        color:#9A9A9A;
        position:absolute;  
        top:610px; 
        left:81px; 
        z-index:30;
        white-space:nowrap; 
    }
    .agreement a{
        color:#FF8C00;
        text-decoration: none;
    }
</style>
</head>
<body>
     
    <div class="register-box">
        <img src="picture/Status bar.png"class="top-img">
              <div class="title-text">您好，一键注册！</div>
       
        <div class="white-box">
            <div class="login-link">已有账号？<a href="denglu.html">立即登录</a></div>
            <div class="input-item">
                <label>手机号</label>
                <input type="tel" placeholder="请输入手机号"value="123456789">

            </div>
    <div class="input-item">
        <label>短信验证码</label>
        <div class="code-row">
            <input type="text"placeholder="请输入验证码"value="123456">
            <button class="get-code-btn">获取验证码</button>
        </div>
    </div>
    <div class="input-item">
        <label>设置密码</label>
        <input type="password" placeholder="请设置密码"value="88888888">
    </div>
  
        </div> 
         <button class="register-btn"onclick="window.location.href='denglu.html'">立即注册</button>
    <div class="agreement">登录及接受<a href="#">用户协议</a>及<a href="#">隐私及政策</a></div>
        </div>
</body>
</html>
