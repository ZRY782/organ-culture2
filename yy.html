<script>
const calendarNums=document.querySelectorAll('.calendar-num[data-day]');
const reserveBtn=document.getElementById('reserveBtn');
const yyMask=document.getElementById('yyMask');
const pickDate=document.getElementById('pickDate');
const closeBtn=document.getElementById('closeBtn');
const submitBtn=document.getElementById('submitBtn');
const phoneInput = document.querySelector('.input-group input[type="tel"]');
const nameInput = document.querySelector('.input-group input[type="text"]');

let selectedDay=1;
let selectedLunar='十二';
document.querySelector('.calendar-num[data-day="1"]').classList.add('active');


calendarNums.forEach(num=>{
   num.addEventListener('click',function(){
    calendarNums.forEach(item=>{
         item.classList.remove('active');
                });
    this.classList.add('active');
    selectedDay = this.dataset.day;
                selectedLunar = this.dataset.lunar || '';
                
                console.log('选中日期：', selectedDay, '农历：', selectedLunar);
            });
        });
        
        reserveBtn.addEventListener('click', function() {
            pickDate.textContent = `采摘日期：12月${selectedDay}日`;
            yyMask.style.display = 'flex';
        });
        
        
        closeBtn.addEventListener('click', function() {
            yyMask.style.display = 'none';
        });
   

    submitBtn.addEventListener('click',function(){
        const phoneValue=phoneInput ? phoneInput.value.trim():'';
        const nameValue=nameInput ? nameInput.value.trim():'';
        if(!nameValue){
            alert('请输入姓名！');
            return;
        }
          if(!phoneValue){
            alert('请输入手机号！');
            return;
        }
        const phoneRegex=/^1[3-9]\d{9}$/;
        if(!phoneRegex.test(phoneValue)){
            alert('请输入正确手机号');
            return;
        }
alert(`预约成功！\n采摘日期：12月${selectedDay}日\n姓名：${nameValue}\n手机号：${phoneValue}`);
    });
  
    
  

</script>
