<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>
    首页
</title>
<link rel="stylesheet" href="style.css">
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        margin:0;
        justify-content:center;
        align-items:center;
        background-color: #f0f0f0;
        font-family:"微软雅黑",sans-serif;
        overflow: auto;
        display:flex; 
        min-height:100vh;
    }
    .home-container{
        width:393px;
        height:852px;
        margin:0 auto;
        background-color:#fff;
        overflow: hidden;
        display:flex;
        flex-direction: column;
        padding-top:60px;
        position:relative;
       
    }
    
    .search-area{
        padding:10px 20px;
       
        background-color: #fff;
    }
    .search-box{
        width:100%;
        height:31px;
        border:0px;
        border-radius:8px;
        padding:0 16px;
        font-size: 16px;
        color:#B5B5B5;
        background-color: #EFEFEF;
        outline:none;
    }
    .banner-area{
        width:100%;
        height:199px;
        position:relative;
        overflow:hidden;
        margin-bottom:20px;
    }
    .banner-list{
        display:flex;
        width:1182px;
        height:100%;
        transition:transform 2s ease;
        gap:15px;

    }
    .banner-item img{
        width:100%;
        height:100%;
        object-fit:cover;
    }
    .banner-item{
        width:369px;
        height:190px;
        flex-shrink:0;
    }
    .recommend-area{
        padding:0px 16px;
        margin-bottom:20px;
    }
    .recommend-title{
        display:flex;
        justify-content: space-between;
        align-items:center;
        font-size:13px;
        margin-bottom:20px;
        font-weight: bold;
        color:#000;
    }
    .section-title {
        font-size:16px;
        color:#000;
        text-decoration: none;
        margin-bottom:10px;
    }
    .recommend-list{
        display:flex;
        justify-content: space-between;
       gap:10px;
    }
    .recommend-item{
        width:31%;
        height:117px;
      background: linear-gradient(to bottom, #FC9E68, #ffffff);
      border-radius: 12px;
      display:flex;
      flex-direction: column;
      justify-content: center;
      align-items:Center;

    }
    .recommend-item a{
        text-decoration: none;
    }
    .recommend-item img{
        width:86px;
        height:88px;
        margin-bottom: 10px;
    }
    .recommend-item span{
        font-size:13px;
        color:#000;
    }
    .recommend-box{
        width:100%;
        height:11px;
        background-color: #FAFAFA;
       margin-top: 0px;
       margin-bottom:10px;
     
    }
    
    .news-area{
        flex:1;
        padding:10px 16px;
        overflow: auto;
        overflow-y:auto;
        margin-bottom:50px;

    }
    .news-area::-webkit-scrollbar {
        display: none; 
    }
    .new-list{
        display:flex;
        flex-direction: column;
        gap:12px;
    }
    .new-item{
        width:100%;
        height:204px;
        overflow:hidden;
    }
    .new-item img{
        width:100%;
        height:100%;
        object-fit:cover;
    }
</style>
</head>
<body>
   
    <div class="home-container">
         <div class="top-img">
            <img src="picture/Status bar.png"class="top-img">
        </div>
        <div class="search-area">
            <input type="text"class="search-box"placeholder="搜索">
        </div>
        <div class="banner-area">
            <div style="width:369px;margin:8px; overflow:hidden;">
                   <div class="banner-list" id="bannerList">
                <div class="banner-item">
                    <img src="picture/banner1.png">
                </div>
                <div class="banner-item">
                    <img src="picture/banner2.png">
                </div>
                <div class="banner-item">
                    <img src="picture/banner3.png">
                </div>
            </div>
            </div>
         
        </div>
        <div class="recommend-area">
            <div class="section-title">
                推荐入口>>
             </div>
        <div class="recommend-list">
            <div class="recommend-item">
                <a href="zhishi.html">
                <img src="picture/renyang.png"></a>
                <span>知识科普</span>
            </div>
             <div class="recommend-item">
                <a href="yx.html">
                <img src="picture/youxi.png"></a>
                <span>瓯柑游戏</span>
            </div>
             <div class="recommend-item">
                <a href="gushi.html">
                <img src="picture/gushi.png"></a>
                <span>瓯柑故事</span>
            </div>
        </div>
        </div> 
        <div class="recommend-box">
        </div>
        <div class="news-area">
            <div class="section-title">
                热门动态>>
            </div>
            <div class="new-list">
                <div class="new-item">
                  <a href="hdxq.html"> <img src="picture/wenhuajie.png"></a>
                </div>
                 <div class="new-item">
                    <img src="picture/qifu.png">
                </div>
                 <div class="new-item">
                    <img src="picture/shiyong.png">
                </div>
            
        </div>
        </div>
            <div class="bottom-bar">
                <div class="bottom-item active">
                  <a href="shouye.html"> <img src="picture/home2.png"></a> 
                    <span>首页</span>
                </div>
                <div class="bottom-item ">
                   <a href="sc.html"><img src="picture/store.png"></a>
                    <span>商城</span>
                </div>
                <div class="bottom-item ">
                   <a href="shequ.html"> <img src="picture/community.png"></a>
                    <span>社区</span>
                </div><div class="bottom-item ">
                   <a href="wd.html">  <img src="picture/person.png"></a>
                    <span>我的</span>
                </div>
            </div>
    </div>
    <script>
         var bannerList = document.getElementById('bannerList');
if (bannerList) {
    var currentIndex = 0;
    var totalCount = 3;
    var singleWidth = 387; 

    function autoPlay() {
        currentIndex = (currentIndex + 1) % totalCount;
        var translateX = -currentIndex * singleWidth;
        bannerList.style.transform = 'translateX(' + translateX + 'px)';
    }
      
        setInterval(autoPlay, 2000);
}
    </script>
</body>
</html>
