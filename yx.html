<!DOCTYPE html>

  <link rel="stylesheet" href="style.css">
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        margin:0;
        justify-content:center;
        align-items:center;
        background-color: #f0f0f0;
        font-family:"微软雅黑",sans-serif;
        overflow: auto;
        display:flex; 
        min-height:100vh;

    .main-container{
        width:393px;
        height:852px;
       background-color:#FFCA55;
        display:flex;
        flex-direction:column;
        align-items:center;
        text-align:center;
        position:relative;
    }
    
     .back-btn{
        font-size:25px;
            color:#ffffff;
            text-decoration: none;
          width:50px;
          position:absolute;
          left:20px;
          margin-top:80px;
          z-index:10;
    }
    .page-title{
        font-size:48px;

            margin-top:100px;

            width:100%;

    }
    .orange-box{
        width:228px;
        height:228px;
        border-radius: 50%;

        z-index:10;
        left:90px;
        margin-top:200px;
    }
    .orange-box2{
        width:176px;
        height:176px;
        border-radius: 50%;

        margin-top:225px;
    }
    .white-box{
        width:320px;
        height:65px;
        background-color: #ffffff;
        position:absolute;
        margin-top:460px;
        left:40px;
        border-radius: 50px;
        color:#909090;
        font-size:18px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        display:flex;
        justify-content: flex-start;
        gap:10px;
        padding-left:20px;
        align-items: center;
    }
    .ss-img{
        width:31px;
        height:31px;
       display:flex;
       align-items: center;
        
    }
    .ss-img img {
    width: 100%;
    height: 100%;
}
.bottom-box{
    width:322px;
    height:223px;
    background-color: #ffff;
    border-radius:18px;
    margin-bottom:50px;
    margin-left:10px;
    display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
}
.green-box{
    width:139px;
    height:181px;
    background-color:#CFF4D5 ;

    padding-top:10px;
    
     display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
}
.green-text{
    color: #000;
    font-size:14px;
    margin-top:1px;
    align-items: center;
    text-align: center;
    text-decoration: none;
}
.blue-box{
    width:139px;
    height:181px;
    background-color:#D5DFF8 ;
    border-radius: 25px;
    padding-top:10px;
   
     display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
}
.blue-text{
    color: #000;
    font-size:14px;
    margin-top:1px;
    align-items: center;
    text-align: center;
}
