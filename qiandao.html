    <style>
       
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FAFAFA;
            min-height: 100vh;
            font-family: "微软雅黑", sans-serif;
        }
        .qiandao-container{
            width:393px;
            height:852px;
            background-color:#FAFAFA;
            position:relative;
            overflow:hidden;
        }
        .top-nav{
            width:100%; 
            height:160px; 
            background-color:#FFFFFF;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 15px;
            margin: 0 auto; 
            
        }
        .back-btn{
            font-size:25px;
            color:#000;
            text-decoration: none;
          width:25px;
          margin-top:79px;
        }
        .page-title{
            font-size:28px;
            color:#000;
            margin-top:79px;
            flex:1;
            margin-left:100px;
           
        }
        .score-text{
            font-size:14px;
            color:#000;
            width:90px;
           text-align:left;
            white-space:nowrap;
            margin-top:90px;
        }
        
        .calendar-card{
            width:98%;
            background-color:#fff;
            border-radius: 20px;
            margin:10px auto;
        }
        .month-title{
            font-size:18px;
            
            margin-bottom:15px;
            margin-left:10px;
        }
        .calendar-header{
            display:grid;
            grid-template-columns: repeat(7,1fr);
            text-align:center;
            font-size:20px;
            color:#A7A7A7;
            margin-bottom:10px;
        }
        .calendar-body{
            display:grid;
            grid-template-columns: repeat(7,1fr);
            gap:10px;
        }
        .day-item{
            width:30px;
            height:30px;
            border-radius: 50%;
            display:flex;
            justify-content: center;
            align-items: center;
            font-size:17px;
            margin:0 auto;
        }
        .day-item.checked{
            background-color: #E7D4FF;
            color:#000;
            font-weight:600;
        }
        .day-item.unchecked{
            color:#A7A7A7;
        }
        
        .satas-area{
    display: flex;
    flex-direction:column;
    
    align-items:center; 
    width:95%;
    height:130px;
    margin:20px auto 20px auto;
    background-color: #fff;
    border-radius: 20px;
    padding:15px 10px;
    box-sizing: border-box;
}
      .stats-items {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px; 
        }

.stat-card{
    display:flex;
    align-items: center;
    width:100%;  
    gap:8px;
    padding-left:15px;
    padding-right:50px
}
        .stat-text{
            font-size: 13px;
            color:#808080;
           text-align:left;
            
        }
        .stat-text2{
            font-size:16px;
            font-weight:600;
            
            color:#000;
        }
        .progress-area{
            width:95%;
            height:10px;
            background-color: #EFEFEF;
            border-radius:5px ;
            overflow:hidden;
            margin-bottom:5px;
            margin-top:10px;
            
        }
        .progress-fill{
            height:100%;
            background-color:#5E02DD;
            width:16%;
        }
        .progree-text{
            display:flex;
            justify-content: space-between;
            font-size:10px;
            color:#777777;
            width:100%;
        
        }
        .rule-area{
            width:90%;
            height:185px;
            background-color: #fff;
            border-radius: 20px;
            padding:15px;
            margin:0 auto;
        }
        .rule-title{
            font-size:15px;
            font-weight:600;
            margin-bottom:15px;
            text-align:center;
        }
        .rule-list{
            font-size:13px;
            color:#7F7F7F;
            line-height:1.8;
        }
        .rule-btn{
            width:50px;
            height:50px;
            border-radius: 50%;
            background-color: #5E02DD;
            color:#fff;
            display:flex;
            justify-content: center;
            align-items: center;
            font-size:24px;
            position:absolute;
            bottom:25px;
            right:25px;
